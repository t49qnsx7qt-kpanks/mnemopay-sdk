# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# MnemoPay: Production payment infrastructure for AI agents — memory, identity, and real payment rails.

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - agentId
    properties:
      agentId:
        type: string
        default: "mcp-agent"
        description: Agent identifier. Each agent gets its own memory store, wallet, identity, and credit score.
      persistDir:
        type: string
        description: Directory for file-based persistence (SQLite). Defaults to ~/.mnemopay if not set.
      openaiApiKey:
        type: string
        description: OpenAI API key for semantic recall via embeddings (optional, enables vector search).
      recall:
        type: string
        enum:
          - score
          - vector
          - hybrid
        description: "Recall strategy: score (default), vector (semantic), or hybrid."
      stripeSecretKey:
        type: string
        description: Stripe secret key for payment rails (optional, enables Stripe charges/payouts).
      paystackSecretKey:
        type: string
        description: Paystack secret key for payment rails (optional, enables Paystack charges/payouts).
      debug:
        type: boolean
        default: false
        description: Enable debug logging.
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@mnemopay/sdk'],
      env: {
        MNEMOPAY_AGENT_ID: config.agentId || 'mcp-agent',
        ...(config.persistDir ? { MNEMOPAY_PERSIST_DIR: config.persistDir } : {}),
        ...(config.openaiApiKey ? { OPENAI_API_KEY: config.openaiApiKey } : {}),
        ...(config.recall ? { MNEMOPAY_RECALL: config.recall } : {}),
        ...(config.stripeSecretKey ? { STRIPE_SECRET_KEY: config.stripeSecretKey } : {}),
        ...(config.paystackSecretKey ? { PAYSTACK_SECRET_KEY: config.paystackSecretKey } : {}),
        ...(config.debug ? { DEBUG: 'true' } : {})
      }
    })
