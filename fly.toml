app = 'mnemopay-mcp'
primary_region = 'dfw'

[build]

[env]
  PORT = '3200'
  MNEMOPAY_MODE = 'quick'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3200
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  timeout = '5s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
